name: portal-ci

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
      - "claude/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (lockfile-strict)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (portal smoke suites)
        run: npm test

      - name: Build (Next production)
        env:
          NEXT_TURBOPACK_EXPERIMENTAL_USE_SYSTEM_TLS_CERTS: "1"
        run: npm run build
